services:
  db:
    image: postgres:15
    container_name: majesty-db
    restart: always
    environment:
      POSTGRES_USER: majesty_user
      POSTGRES_PASSWORD: majesty_password
      POSTGRES_DB: majesty_realm
    ports:
      - "5432:5432"

  pgadmin:
    image: dpage/pgadmin4
    container_name: majesty-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "8081:80"
    depends_on:
      - db